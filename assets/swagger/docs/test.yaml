      description: Retrieve Transactions by reference number.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                reference_number:
                  type: integer
                  description: '(Required) '
                  example: '1234567890'
      security:
        - bearerAuth: []
      parameters:
        - name: Content-Type
          in: header
